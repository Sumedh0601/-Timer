<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumedh Timer</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    font-family: 'Segoe UI', sans-serif;

    background: linear-gradient(
        -45deg,
        #020024,
        #090979,
        #00d4ff,
        #6a00ff
    );
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;

    overflow: hidden;
}

@keyframes gradientBG {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

.timer-container {
    width: 450px;
    padding: 35px;

    text-align: center;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px);

    border: 1px solid rgba(255, 255, 255, 0.2);

    border-radius: 30px;

    box-shadow:
        0 0 20px rgba(0, 255, 255, 0.4),
        0 0 40px rgba(0, 255, 255, 0.2),
        inset 0 0 20px rgba(255, 255, 255, 0.1);

    animation: floatCard 4s ease-in-out infinite;
}

@keyframes floatCard {
    0%,100% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-10px);
    }
}

.timer-container h1 {
    font-size: 2rem;
    margin-bottom: 20px;

    color: #fff;
    letter-spacing: 3px;
    text-transform: uppercase;

    text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
}

#display {
    font-size: 4rem;
    font-weight: bold;

    margin: 25px 0;

    color: #00ffff;

    text-shadow:
        0 0 5px #00ffff,
        0 0 15px #00ffff,
        0 0 30px #00ffff,
        0 0 60px #00ffff;

    letter-spacing: 4px;
}

.controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

button {
    position: relative;

    padding: 12px 28px;

    border: none;
    border-radius: 50px;

    font-size: 1rem;
    font-weight: 600;

    cursor: pointer;

    color: white;

    transition: all 0.3s ease;

    overflow: hidden;
}

button::before {
    content: "";

    position: absolute;
    top: 0;
    left: -100%;

    width: 100%;
    height: 100%;

    background: rgba(255,255,255,0.3);

    transform: skewX(-25deg);

    transition: 0.5s;
}

button:hover::before {
    left: 120%;
}

button:hover {
    transform: translateY(-4px) scale(1.05);
}

#startBtn {
    background: #00ff99;

    box-shadow:
        0 0 10px #00ff99,
        0 0 25px #00ff99;
}

#stopBtn {
    background: #ff0055;

    box-shadow:
        0 0 10px #ff0055,
        0 0 25px #ff0055;
}

#setBtn {
    background: #ffcc00;
    color: #111;

    box-shadow:
        0 0 10px #ffcc00,
        0 0 25px #ffcc00;
}

#resetBtn {
    background: #00aaff;

    box-shadow:
        0 0 10px #00aaff,
        0 0 25px #00aaff;
}

button:active {
    transform: scale(0.95);
}

@media (max-width: 500px) {
    .timer-container {
        width: 95%;
        padding: 25px;
    }

    #display {
        font-size: 2.7rem;
    }

    button {
        width: 100%;
    }
}    }
    </style>
</head>
<body>

    <div class="timer-container">
        <h1>Mr Sumedh</h1>
        <div id="display">00:00:00</div>
        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="stopBtn">Stop</button>
            <button id="setBtn">Set</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        let timer;
        let isRunning = false;
        let startTime;
        let elapsedTime = 0;
        let setTime = 0;

        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const setBtn = document.getElementById('setBtn');
        const resetBtn = document.getElementById('resetBtn');

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const pad = (num) => String(num).padStart(2, '0');
            return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
        }

        function updateDisplay() {
            if (setTime > 0) {
                // Countdown logic
                const remainingTime = setTime - elapsedTime;
                if (remainingTime <= 0) {
                    stopTimer();
                    display.innerHTML = "00:00:00";
                    alert("Time's up!");
                } else {
                    display.innerHTML = formatTime(remainingTime);
                }
            } else {
                // Stopwatch logic
                display.innerHTML = formatTime(elapsedTime);
            }
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                startTime = Date.now() - (setTime > 0 ? (setTime - elapsedTime) : elapsedTime);
                timer = setInterval(() => {
                    elapsedTime = Date.now() - startTime;
                    updateDisplay();
                }, 1000);
                startBtn.disabled = true;
                stopBtn.disabled = false;
            }
        }

        function stopTimer() {
            if (isRunning) {
                isRunning = false;
                clearInterval(timer);
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function setTimer() {
            const input = prompt("Enter time in HH:MM:SS format:", "00:05:00");
            if (input) {
                const parts = input.split(':');
                if (parts.length === 3) {
                    const hours = parseInt(parts[0], 10) || 0;
                    const minutes = parseInt(parts[1], 10) || 0;
                    const seconds = parseInt(parts[2], 10) || 0;
                    setTime = (hours * 3600 + minutes * 60 + seconds) * 1000;
                    elapsedTime = 0;
                    stopTimer();
                    updateDisplay();
                } else {
                    alert("Invalid format. Please use HH:MM:SS.");
                }
            }
        }

        function resetTimer() {
            stopTimer();
            elapsedTime = 0;
            setTime = 0;
            updateDisplay();
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        startBtn.addEventListener('click', startTimer);
        stopBtn.addEventListener('click', stopTimer);
        setBtn.addEventListener('click', setTimer);
        resetBtn.addEventListener('click', resetTimer);
    </script>

</body>
</html>
